<!DOCTYPE html>
<html>
<head>
    <title>Update Staff</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Update Info: {{ uname }}</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('update_user', username=uname) }}" method="POST">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" value="{{ user[1] }}">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" value="{{ user[0] }}">
            </div>

            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" value="{{ user[2] }}">
            </div>

            <div class="form-group">
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" value="{{ user[3] }}">
            </div>

            <div class="form-group">
                <label for="sales">Sales Amount:</label>
                <input type="text" id="sales" name="sales" value="{{ user[4] }}">
            </div>

            <div class="form-group">
                <label for="role">Role:</label>
                <select id="role" name="role">
                    <option value="cashier" {% if user[5] == 'cashier' %}selected{% endif %}>Cashier</option>
                    <option value="admin" {% if user[5] == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>

            <button type="submit">UPDATE</button>
        </form>

        <div class="nav-links" style="margin-top: 20px; text-align: center;">
            {% if user[5] == 'admin' %}
                <a href="{{ url_for('records_view', username='admin') }}">Cancel and Go Back</a>
            {% else %}
                <a href="{{ url_for('records_view', username=uname) }}">Cancel and Go Back</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
